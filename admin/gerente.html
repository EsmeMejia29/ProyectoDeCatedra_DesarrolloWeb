<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gerente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/gerente.css">
</head>

<body style="display: none;">

    <div class="header">
        <div class="d-flex align-items-center gap-3">
            <img src="../img/logoSaborSalvadorenno.png" alt="Logo" width="65">
            <div>
                <h2 class="mb-0 fs-4">Sabor Salvadoreño</h2>
                <p class="text-muted mb-0 small fw-bold">Administración General</p>
            </div>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="user-badge">
                <i class="fas fa-user-tie"></i>
                <span>Gerente</span>
            </div>
            <button id="logoutBtn" class="btn logout-btn">
                <i class="fas fa-sign-out-alt me-2"></i>Salir
            </button>
        </div>
    </div>

    <div class="container-fluid mt-4 px-4">

        <div class="row g-3 mb-4">

            <div class="col-xl-3 col-md-12">
                <div class="stats-card border-naranja d-flex align-items-center justify-content-between px-4 h-100">
                    <div>
                        <h6 class="text-muted mb-1">Personal Activo</h6>
                        <div class="value text-naranja" id="statEmpleados">0</div>
                    </div>
                    <i class="fas fa-users fa-2x text-naranja opacity-25"></i>
                </div>
            </div>

            <div class="col-xl-9 col-md-12">
                <div class="row g-3 h-100">
                    <div class="col-6 col-md-4 col-xl">
                        <div class="stats-card">
                            <h6>Total</h6>
                            <div class="value" id="statTotal">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-xl">
                        <div class="stats-card">
                            <h6>Pupusas</h6>
                            <div class="value" id="statPupusas">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-xl">
                        <div class="stats-card">
                            <h6>Bebidas</h6>
                            <div class="value" id="statBebidas">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-xl">
                        <div class="stats-card">
                            <h6>Postres</h6>
                            <div class="value" id="statPostres">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-xl">
                        <div class="stats-card">
                            <h6>Entradas</h6>
                            <div class="value" id="statEntradas">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-xl">
                        <div class="stats-card">
                            <h6>Platos</h6>
                            <div class="value" id="statPrincipales">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">

            <div class="col-lg-4">

                <div class="content-section mb-4">
                    <h4 class="section-title"><i class="fas fa-user-tie me-2 text-naranja"></i>Registro RRHH</h4>
                    <button id="addEmployeeBtn" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-plus me-2"></i>Nuevo Empleado
                    </button>

                    <div id="formEmpleadoContainer" class="d-none bg-light p-3 rounded border">
                        <form id="formEmpleado">
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Nombre Completo</label>
                                <input type="text" class="form-control form-control-sm" id="empNombre" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Rol</label>
                                <select class="form-select form-select-sm" id="empRole">
                                    <option value="Empleado">Empleado</option>
                                    <option value="Gerente">Gerente</option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Correo</label>
                                <input type="email" class="form-control form-control-sm" id="empEmail" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Contraseña</label>
                                <input type="password" class="form-control form-control-sm" id="empPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-sm">Registrar Usuario</button>
                        </form>
                    </div>
                </div>

                <div class="content-section mb-4">
                    <h4 class="section-title"><i class="fas fa-utensils me-2 text-naranja"></i>Gestión Menú</h4>
                    <button id="addProductBtn" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-plus me-2"></i>Nuevo Platillo
                    </button>

                    <div id="formProductoContainer" class="d-none bg-light p-3 rounded border">
                        <form id="formProducto">
                            <input type="hidden" id="editId">
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Nombre</label>
                                <input type="text" class="form-control form-control-sm" id="prodNombre" required>
                            </div>
                            <div class="row g-2">
                                <div class="col-6 mb-2">
                                    <label class="form-label small fw-bold">Precio</label>
                                    <input type="number" step="0.01" class="form-control form-control-sm"
                                        id="prodPrecio" required>
                                </div>
                                <div class="col-6 mb-2">
                                    <label class="form-label small fw-bold">Categoría</label>
                                    <select class="form-select form-select-sm" id="prodCategoria">
                                        <option value="Pupusas">Pupusas</option>
                                        <option value="Platos Principales">Platos Principales</option>
                                        <option value="Entradas">Entradas</option>
                                        <option value="Postres">Postres</option>
                                        <option value="Bebidas">Bebidas</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Descripción</label>
                                <textarea class="form-control form-control-sm" id="prodDesc" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">URL Imagen</label>
                                <input type="text" class="form-control form-control-sm" id="prodImg">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-sm" id="btnGuardarProd">Guardar
                                Producto</button>
                            <button type="button" class="btn btn-secondary w-100 btn-sm mt-2 d-none"
                                id="btnCancelarEdit">Cancelar</button>
                        </form>
                    </div>
                </div>

                <div class="content-section mb-4">
                    <h4 class="section-title"><i class="fas fa-tags me-2 text-naranja"></i>Promociones</h4>
                    <button id="addPromoBtn" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-plus me-2"></i>Nueva Oferta
                    </button>

                    <div id="formPromocionContainer" class="d-none bg-light p-3 rounded border">
                        <form id="formPromocion">
                            <input type="hidden" id="promoId">
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Título</label>
                                <input type="text" class="form-control form-control-sm" id="promoTitulo" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Categoría</label>
                                <select class="form-select form-select-sm" id="promoCategoria">
                                    <option value="combo-oferta">Combos en Oferta</option>
                                    <option value="paquete-familiar">Paquetes Familiares</option>
                                    <option value="fin-semana">Fin de Semana</option>
                                    <option value="hora-feliz">Hora Feliz</option>
                                </select>
                            </div>
                            <div class="row g-2">
                                <div class="col-6 mb-2">
                                    <label class="form-label small fw-bold">Precio Real</label>
                                    <input type="number" step="0.01" class="form-control form-control-sm"
                                        id="promoPrecioOriginal" required>
                                </div>
                                <div class="col-6 mb-2">
                                    <label class="form-label small fw-bold">Precio Oferta</label>
                                    <input type="number" step="0.01" class="form-control form-control-sm"
                                        id="promoPrecioOferta" required>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Badge (ej: 20% OFF)</label>
                                <input type="text" class="form-control form-control-sm" id="promoDescuentoTexto"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">URL Imagen</label>
                                <input type="text" class="form-control form-control-sm" id="promoImg">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-sm" id="btnGuardarPromo">Publicar
                                Promo</button>
                            <button type="button" class="btn btn-secondary w-100 btn-sm mt-2 d-none"
                                id="btnCancelarPromo">Cancelar</button>
                        </form>
                    </div>
                </div>

            </div>

            <div class="col-lg-8">

                <div class="content-section mb-4">
                    <h4 class="section-title"><i class="fas fa-chart-pie me-2 text-naranja"></i>Distribución del
                        Catálogo</h4>
                    <div style="position: relative; height: 250px; width: 100%;">
                        <canvas id="graficoCategorias"></canvas>
                    </div>
                </div>

                <div class="content-section mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="section-title mb-0">Platos del Menú</h4>
                        <span class="badge bg-secondary">En tiempo real</span>
                    </div>

                    <div class="d-flex gap-2 flex-wrap mb-4">
                        <button class="category-tab active">Todos</button>
                        <button class="category-tab">Entradas</button>
                        <button class="category-tab">Platos Principales</button>
                        <button class="category-tab">Pupusas</button>
                        <button class="category-tab">Postres</button>
                        <button class="category-tab">Bebidas</button>
                    </div>

                    <div id="gridProductos" class="row g-3">
                    </div>
                </div>

                <div class="content-section">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="section-title mb-0">Promociones Activas</h4>
                        <span class="badge bg-success">Público</span>
                    </div>

                    <div id="gridPromociones" class="row g-3">
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const toggle = (btnId, divId) => {
            const btn = document.getElementById(btnId);
            const div = document.getElementById(divId);
            if (btn && div) {
                btn.addEventListener('click', () => {
                    div.classList.toggle('d-none');
                    btn.innerHTML = div.classList.contains('d-none')
                        ? `<i class="fas fa-plus me-2"></i> Mostrar`
                        : `<i class="fas fa-minus me-2"></i> Ocultar`;
                });
            }
        };
        toggle('addProductBtn', 'formProductoContainer');
        toggle('addPromoBtn', 'formPromocionContainer');
        toggle('addEmployeeBtn', 'formEmpleadoContainer');

        // Lógica visual de tabs
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>

    <script type="module" src="../js/logout.js"></script>
    <script type="module" src="../js/operaciones/authGuard.js"></script>
    <script type="module" src="../js/operaciones/logicGerente.js"></script>
    <script type="module" src="../js/operaciones/promociones.js"></script>
</body>

</html>
